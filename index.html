<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Cifras - Catálogo Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-cyan: #38bdf8;
            --accent-purple: #a855f7;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 10% 20%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(168, 85, 247, 0.12) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2.5rem 1.5rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hub-container {
            width: 100%;
            max-width: 900px;
        }

        .hub-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .hub-header h1 {
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .hub-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Toolbar / Glass Box */
        .controls-toolbar {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.4);
        }

        .search-box {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .search-box input {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.7;
        }

        .controls-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        @media (max-width: 650px) {
            .controls-row {
                grid-template-columns: 1fr;
            }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .control-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .control-group select {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .control-group select:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .quick-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .quick-filter-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 0.45rem 0.85rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .quick-filter-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateY(-1px);
        }

        .quick-filter-btn.active {
            background: rgba(56, 189, 248, 0.18);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .btn-count {
            font-size: 0.8em;
            opacity: 0.8;
        }

        /* Song List & Groups */
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            width: 100%;
        }

        .group-section {
            margin-bottom: 2rem;
            animation: fadeIn 0.3s ease;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.75rem 1rem;
            background: rgba(30, 41, 59, 0.45);
            border-left: 4px solid var(--accent-cyan);
            border-radius: 6px;
            margin-bottom: 1rem;
            font-weight: 700;
            font-size: 1.15rem;
            color: #fff;
        }

        .group-count {
            margin-left: auto;
            font-size: 0.82rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .group-cards {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        /* Song Link Card */
        .song-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.4rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .song-link:hover {
            background: rgba(56, 189, 248, 0.08);
            transform: translateY(-3px) scale(1.005);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.2);
        }

        .song-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .song-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .song-artist {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .song-composer {
            font-size: 0.85em;
            opacity: 0.85;
            font-weight: 400;
        }

        /* Badges */
        .song-badges {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .chord-badge {
            font-size: 0.82rem;
            font-weight: 700;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .badge-beginner {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .badge-intermediate {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border-color: rgba(245, 158, 11, 0.3);
        }

        .badge-advanced {
            background: rgba(249, 115, 22, 0.15);
            color: #fb923c;
            border-color: rgba(249, 115, 22, 0.3);
        }

        .badge-expert {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(30, 41, 59, 0.3);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="hub-container">
        <header class="hub-header">
            <h1>Catálogo de Cifras</h1>
            <p class="hub-subtitle" id="total-count-badge">Carregando catálogo de músicas...</p>
        </header>

        <section class="controls-toolbar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Buscar por título, artista, compositor ou ID...">
            </div>

            <div class="controls-row">
                <div class="control-group">
                    <label for="group-select">Agrupar por:</label>
                    <select id="group-select">
                        <option value="none">🔤 Nenhum (Lista Geral)</option>
                        <option value="chords-range">📊 Faixa de Acordes (Iniciante / Avançado)</option>
                        <option value="artist">👤 Artista / Intérprete</option>
                        <option value="letter">🔠 Letra Inicial (A-Z)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="sort-select">Ordenar por:</label>
                    <select id="sort-select">
                        <option value="title-asc">🔤 Ordem Alfabética (A-Z)</option>
                        <option value="title-desc">🔤 Ordem Alfabética (Z-A)</option>
                        <option value="chords-asc">🔢 Menos Acordes (Menor complexidade)</option>
                        <option value="chords-desc">🔢 Mais Acordes (Maior complexidade)</option>
                        <option value="artist-asc">👤 Artista (A-Z)</option>
                    </select>
                </div>
            </div>

            <div class="quick-filters">
                <button class="quick-filter-btn active" data-filter="all">Todos <span class="btn-count"></span></button>
                <button class="quick-filter-btn" data-filter="beginner">🟢 Iniciante (1-5) <span class="btn-count"></span></button>
                <button class="quick-filter-btn" data-filter="intermediate">🟡 Intermediário (6-10) <span class="btn-count"></span></button>
                <button class="quick-filter-btn" data-filter="advanced">🟠 Avançado (11-15) <span class="btn-count"></span></button>
                <button class="quick-filter-btn" data-filter="expert">🔴 Expert (16+) <span class="btn-count"></span></button>
            </div>
        </section>

        <div class="song-list" id="song-list-container">
            <!-- Songs will be injected here -->
        </div>
    </div>

    <!-- Scripts do Catálogo -->
    <script src="data/catalog.js"></script>
    <script src="assets/js/hub.js"></script>
</body>
</html>
