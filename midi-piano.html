<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web MIDI Piano Visualizer</title>
    <link rel="stylesheet" href="assets/css/midi-piano.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="visualizer-container">
        <!-- Display area for currently pressed note names (e.g. F A C) -->
        <div class="note-display" id="note-display">
            <!-- Note labels will be injected here -->
        </div>

        <!-- The Piano Keyboard -->
        <div class="piano-keyboard" id="piano-keyboard">
            <!-- Keys will be generated by JS -->
        </div>
    </div>

    <script src="assets/modules/MidiDetector.js"></script>
    <script src="assets/js/midi-piano.js"></script>
</body>
</html>
