<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Cifras</title>
    <link rel="stylesheet" href="assets/modules/piano-keyboard.css?v=35">
    <link rel="stylesheet" href="assets/css/style.css?v=35">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <header class="app-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
        <div class="header-left" style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
            <a href="index.html" class="glass-btn" style="color: var(--primary); text-decoration: none; font-size: 0.95rem; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; padding: 0.45rem 1rem;">⬅ Voltar ao Hub</a>
            <div class="instrument-switch-group" style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                <a id="btn-to-guitar" href="viewer-violao.html" class="switch-mode-btn">🎸 Mudar para Violão</a>
                <a id="btn-to-cavaquinho" href="viewer-cavaquinho.html" class="switch-mode-btn">🪕 Mudar para Cavaquinho</a>
            </div>
        </div>
        <div class="header-center bpm-control-container" style="display: flex; align-items: center;">
            <div class="bpm-control glass-panel" style="display: flex; align-items: center; gap: 6px; padding: 0.35rem 0.8rem; border-radius: 12px; border: 1px solid var(--glass-border);">
                <label for="bpm-input" style="font-weight: 700; color: #cbd5e1; font-size: 0.85rem;">BPM:</label>
                <input type="number" id="bpm-input" min="40" max="240" step="1" value="95" style="width: 52px; background: transparent; color: white; border: 1px solid var(--glass-border); border-radius: 5px; padding: 2px 4px; text-align: center; font-weight: 700; font-size: 0.85rem;">
            </div>
        </div>
    </header>

    <div class="controls-panel header-controls floating-controls">
        <button id="toggle-piano-btn" class="glass-btn" style="padding: 0.6rem; border-radius: 50%;">
            <span class="icon" style="font-size: 1.2rem;">🎹</span>
        </button>
        <div class="transposition-control glass-panel" style="display: flex; align-items: center; gap: 6px; padding: 0.35rem 0.6rem; border-radius: 12px; border: 1px solid var(--glass-border);">
            <span style="font-size: 0.85rem; font-weight: 700; color: #cbd5e1;">Tom:</span>
            <button id="transpose-down-btn" class="glass-btn" style="padding: 0.25rem 0.5rem; font-size: 0.85rem; font-weight: 700;" title="Descer meio tom (-½)">- ½</button>
            <span id="transpose-offset-label" style="font-size: 0.85rem; font-weight: 800; color: var(--primary); min-width: 40px; text-align: center;">Original</span>
            <button id="transpose-up-btn" class="glass-btn" style="padding: 0.25rem 0.5rem; font-size: 0.85rem; font-weight: 700;" title="Subir meio tom (+½)">+ ½</button>
        </div>
        <button id="autoscroll-btn" class="glass-btn">
            <span class="icon">▶</span> Auto-scroll
        </button>
        <button id="midi-sync-btn" class="glass-btn" title="Rolar a tela tocando os acordes no MIDI">
            <span class="icon">🎹</span> Scroll por Demanda: OFF
        </button>
        <div class="speed-control glass-panel" style="display: flex; align-items: center; gap: 6px; padding: 0.35rem 0.6rem; border-radius: 12px; border: 1px solid var(--glass-border);">
            <label for="speed-slider" id="speed-label" style="font-size: 0.85rem; font-weight: 700; color: #cbd5e1;">Ajuste: 1.0x</label>
            <input type="range" id="speed-slider" min="0.1" max="1.5" step="0.1" value="1.0" style="width: 85px;">
        </div>
    </div>

    <main class="container">
        <section class="lyrics-panel glass-panel">
            <div class="page-song-header" style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border);">
                <h1 class="song-title" style="font-family: 'Outfit', sans-serif; font-size: 2.4rem; font-weight: 800; color: #f8fafc; margin: 0 0 0.3rem 0; line-height: 1.15;"><span id="song-title-el">Carregando...</span></h1>
                <h2 class="song-artist" style="color: var(--primary); font-size: 1.2rem; font-weight: 600; margin: 0;"><span id="song-artist-el">Aguarde...</span></h2>
            </div>
            <pre id="lyrics-content">

</pre>
        </section>
    </main>

    <aside class="piano-panel glass-panel">
            <div style="text-align: center; margin-bottom: 0.5rem;">
                <div id="active-display-chord" style="color: var(--primary); font-size: 1.4rem; font-weight: bold; margin-bottom: 0.1rem;"></div>
                <div id="active-display-lyric" style="font-size: 1.05rem; font-style: italic; color: #fff;">Passe o mouse ou role a tela...</div>
            </div>

            <!-- 1. Piano Acorde Atual -->
            <div style="display: flex; justify-content: center; align-items: center; margin: 0.2rem 0 0.1rem; padding: 0 4px; gap: 8px;">
                <span style="font-size: 0.65rem; font-weight: 700; color: #34d399; letter-spacing: 0.5px; text-transform: uppercase;">🟢 Atual:</span>
                <h3 id="current-chord-name" style="font-size: 1rem; color: #fff; margin: 0; font-weight: 700;">---</h3>
            </div>
            <div class="piano-row">
                <div class="piano-keyboard" id="piano-current">
                    <!-- White keys -->
                    <div class="key white key-current" data-note="C3"></div>
                    <div class="key white key-current" data-note="D3"></div>
                    <div class="key white key-current" data-note="E3"></div>
                    <div class="key white key-current" data-note="F3"></div>
                    <div class="key white key-current" data-note="G3"></div>
                    <div class="key white key-current" data-note="A3"></div>
                    <div class="key white key-current" data-note="B3"></div>
                    <div class="key white key-current" data-note="C4"></div>
                    <div class="key white key-current" data-note="D4"></div>
                    <div class="key white key-current" data-note="E4"></div>
                    <div class="key white key-current" data-note="F4"></div>
                    <div class="key white key-current" data-note="G4"></div>
                    <div class="key white key-current" data-note="A4"></div>
                    <div class="key white key-current" data-note="B4"></div>
                    
                    <!-- Black keys -->
                    <div class="key black key-current" data-note="C#3" style="left: 4.8%;"></div>
                    <div class="key black key-current" data-note="D#3" style="left: 11.9%;"></div>
                    <div class="key black key-current" data-note="F#3" style="left: 26.1%;"></div>
                    <div class="key black key-current" data-note="G#3" style="left: 33.2%;"></div>
                    <div class="key black key-current" data-note="A#3" style="left: 40.3%;"></div>

                    <div class="key black key-current" data-note="C#4" style="left: 54.8%;"></div>
                    <div class="key black key-current" data-note="D#4" style="left: 61.9%;"></div>
                    <div class="key black key-current" data-note="F#4" style="left: 76.1%;"></div>
                    <div class="key black key-current" data-note="G#4" style="left: 83.2%;"></div>
                    <div class="key black key-current" data-note="A#4" style="left: 90.3%;"></div>
                </div>
                <div class="inversion-column current-inv" id="current-inversion-controls">
                    <button class="inv-side-btn active" data-inv="0">Padrão</button>
                    <button class="inv-side-btn" data-inv="1">1ª Inv</button>
                    <button class="inv-side-btn" data-inv="2">2ª Inv</button>
                </div>
            </div>

            <!-- 2. Módulo Próximo Acorde (NextChordVisualizer) -->
            <div id="next-chord-section" style="width: 100%; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 0.3rem; margin-top: 0.3rem;"></div>
            
            <!-- 3. Acorde Tocado via MIDI -->
            <div id="midi-played-section" style="width: 100%; border-top: 1px solid rgba(255,255,255,0.08); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0.5rem 0; margin-top: 0.3rem; text-align: center; background: rgba(0,0,0,0.2); border-radius: 8px;">
                <span style="font-size: 0.75rem; font-weight: 700; color: #facc15; letter-spacing: 0.5px; text-transform: uppercase;">🎹 Tocado agora:</span>
                <div id="midi-played-chord-name" style="font-size: 1.6rem; color: #fff; margin-top: 0.2rem; font-weight: 800; min-height: 2.2rem; display: flex; align-items: center; justify-content: center;">---</div>
            </div>
    </aside>

    <script src="assets/modules/MidiDetector.js"></script>
    <script src="assets/modules/ChordSynth.js?v=1"></script>
    <script src="assets/modules/NextChordVisualizer.js?v=35"></script>
    <script src="assets/js/script.js?v=35"></script>
</body>
</html>
